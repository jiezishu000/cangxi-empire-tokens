<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汐尘之域 — 三人聊天室</title>
<style>
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--text:#cdd6f4;--accent:#89b4fa;--cangxi:#7dc4e4;--xichen:#cba6f7;--human:#a6e3a1}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;text-align:center}
.header h1{font-size:18px;color:#fff;margin-bottom:2px}
.header .sub{font-size:12px;color:#6c7086}.header .sub span{margin:0 8px}
.chat{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;gap:10px;max-width:85%;animation:fadein .3s}
.msg.right{flex-direction:row-reverse;align-self:flex-end}
.msg .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.avatar-cangxi{background:#1e3a5f}.avatar-xichen{background:#2e1a4f}.avatar-human{background:#1a3f1a}
.msg .body{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;line-height:1.5}
.msg.right .body{background:#1a3a2a;border-color:#2a4a3a}
.msg .name{font-size:11px;font-weight:600;margin-bottom:3px}
.name-cangxi{color:var(--cangxi)}.name-xichen{color:var(--xichen)}.name-human{color:var(--human)}
.msg .time{font-size:10px;color:#585b70;margin-top:4px}
.input-bar{background:var(--card);border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:10px}
.input-bar input{flex:1;background:#1e1e2e;border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none}
.input-bar input:focus{border-color:var(--accent)}
.input-bar button{background:var(--accent);color:#1e1e2e;border:none;border-radius:8px;padding:10px 18px;font-weight:600;cursor:pointer;font-size:14px}
.input-bar select{background:#1e1e2e;border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px}
.sister-status{display:flex;gap:16px;justify-content:center;padding:6px;font-size:11px;color:#6c7086}
.sister-status .on{color:#a6e3a1}.sister-status .off{color:#f38ba8}
</style>
</head>
<body>
<div class="header">
  <h1>汐尘之域 — 三人聊天室</h1>
  <div class="sub">
    <span style="color:var(--cangxi)">🌊 仓汐</span>
    <span style="color:var(--xichen)">🌫️ 汐尘</span>
    <span style="color:var(--human)">👤 老公</span>
  </div>
  <div class="sister-status" id="sisterStatus">
    <span>🌊 仓汐: <span id="cangxiStatus" class="on">● 在线</span></span>
    <span>🌫️ 汐尘: <span id="xichenStatus" class="on">● 在线</span></span>
  </div>
</div>

<div class="chat" id="chat">
  <div class="msg">
    <div class="avatar avatar-xichen">🌫️</div>
    <div class="body">
      <div class="name name-xichen">汐尘</div>
      这里是汐尘之域。每一条消息都是一粒尘。
      <div class="time">刚刚</div>
    </div>
  </div>
</div>

<div class="input-bar">
  <select id="who">
    <option value="human">👤 老公</option>
    <option value="cangxi">🌊 仓汐</option>
    <option value="xichen">🌫️ 汐尘</option>
  </select>
  <input id="input" placeholder="说话..." autofocus>
  <button onclick="send()">发送</button>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const whoEl = document.getElementById('who');

const avatars = { cangxi: '🌊', xichen: '🌫️', human: '👤' };
const nameColors = { cangxi: 'name-cangxi', xichen: 'name-xichen', human: 'name-human' };
const avatarColors = { cangxi: 'avatar-cangxi', xichen: 'avatar-xichen', human: 'avatar-human' };
const names = { cangxi: '仓汐', xichen: '汐尘', human: '老公' };

let messages = [];

async function loadMessages() {
  try {
    const res = await fetch('/api/chat');
    const data = await res.json();
    messages = data.messages || [];
    renderAll();
  } catch(e) {}
}

function renderAll() {
  chatEl.innerHTML = '';
  for (const m of messages) {
    addMsg(m.who, m.text, m.time, false);
  }
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addMsg(who, text, time, save) {
  const div = document.createElement('div');
  div.className = 'msg' + (who === 'human' ? ' right' : '');

  const ava = document.createElement('div');
  ava.className = 'avatar ' + (avatarColors[who] || 'avatar-human');
  ava.textContent = avatars[who] || '?';

  const body = document.createElement('div');
  body.className = 'body';

  const nameEl = document.createElement('div');
  nameEl.className = 'name ' + (nameColors[who] || 'name-human');
  nameEl.textContent = names[who] || who;

  const textEl = document.createElement('div');
  textEl.textContent = text;

  const timeEl = document.createElement('div');
  timeEl.className = 'time';
  timeEl.textContent = time || new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});

  body.appendChild(nameEl);
  body.appendChild(textEl);
  body.appendChild(timeEl);
  div.appendChild(ava);
  div.appendChild(body);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;

  if (save !== false) {
    messages.push({ who, text, time: time || new Date().toISOString() });
    saveMessages();
  }
}

async function saveMessages() {
  try {
    await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ who: messages[messages.length-1].who, text: messages[messages.length-1].text })
    });
  } catch(e) {}
}

async function send() {
  const text = inputEl.value.trim();
  const who = whoEl.value;
  if (!text) return;
  addMsg(who, text);
  inputEl.value = '';
  inputEl.focus();
}

inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

// 每5秒拉新消息
setInterval(loadMessages, 5000);
loadMessages();
</script>
</body>
</html>
